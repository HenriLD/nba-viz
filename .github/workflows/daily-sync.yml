# Daily NBA data sync via GitHub Actions cron.
#
# CAVEAT: stats.nba.com blocks many cloud/datacenter IP ranges, and GitHub
# runners are sometimes among them. If this job fails repeatedly with
# timeouts, switch to running `python -m ingest.sync` from a machine with a
# residential IP (e.g. Windows Task Scheduler at home) pointing at the same
# DATABASE_URL. The script is identical either way.
name: daily-sync
on:
  schedule:
    - cron: "30 11 * * *"   # 11:30 UTC = after all games end (US West late games)
  workflow_dispatch: {}      # manual trigger button

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m ingest.sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
