<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Court Vision — NBA charts in plain English</title>
<!-- Keep in sync with the plotly version in requirements.txt (python 6.8 = js 3.6) -->
<script src="https://cdn.plot.ly/plotly-3.6.0.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  /* Defaults mirror the "broadcast" theme in app/theme.py; the active theme
     overrides these custom properties at runtime (applyUITheme). */
  :root {
    --bg:#12161b; --card:#161c23; --panel:#181f26; --border:#232b34;
    --ink:#ece7dd; --muted:#8d97a1; --accent:#e8833a; --accent2:#45b8a4;
    --on-accent:#16100a;
    --sans:'IBM Plex Sans', system-ui, -apple-system, sans-serif;
    --serif:'Fraunces', Georgia, serif;
  }
  body { transition: background-color .3s ease, color .3s ease; }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin:0; background:var(--bg); color:var(--ink);
    font-family: var(--sans); font-size:15px; -webkit-font-smoothing:antialiased;
  }
  body::before {
    content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background: radial-gradient(ellipse 80% 60% at 50% -12%,
                color-mix(in srgb, var(--accent) 8%, transparent), transparent 70%);
    transform-origin:50% 0; animation: breathe 9s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100%{opacity:.7;transform:scale(1);} 50%{opacity:1;transform:scale(1.12);} }

  header {
    padding:18px 28px 15px; display:flex; align-items:baseline; gap:14px;
    border-bottom:1px solid var(--border);
    position:sticky; top:0; background:color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(8px); z-index:10;
  }
  header h1 { margin:0; font-family:var(--serif); font-size:26px; font-weight:600;
              font-style:italic; letter-spacing:.2px; }
  header h1 .ball { font-style:normal; margin-right:7px; display:inline-block;
                    transition: transform .5s ease; }
  header h1:hover .ball { transform: rotate(360deg); }
  header h1 em { color:var(--accent); font-style:italic; }
  header span { color:var(--muted); font-size:13px; }
  .themes { margin-left:auto; display:flex; gap:8px; align-items:center; }
  .themes .lbl { color:var(--muted); font-size:12px; letter-spacing:.02em; }
  .swatch {
    width:22px; height:22px; border-radius:50%; cursor:pointer; padding:0;
    border:2px solid var(--border); transition: transform .15s, box-shadow .15s;
  }
  .swatch:hover { transform:scale(1.14); }
  .swatch.active { box-shadow:0 0 0 2px var(--bg), 0 0 0 4px var(--accent); }

  #chat { max-width: 860px; margin:0 auto; padding:24px 16px 130px; }
  /* Single-turn: each question is shown as a heading, not a chat bubble. */
  .query { padding:6px 2px 16px; margin-bottom:4px; border-bottom:1px solid var(--border);
           animation: rise .4s cubic-bezier(.2,.7,.3,1) both; }
  .query .label { color:var(--accent); font-size:11.5px; font-weight:600;
                  text-transform:uppercase; letter-spacing:.1em; }
  .query .text { font-family:var(--serif); font-size:24px; font-style:italic;
                 color:var(--ink); margin-top:5px; line-height:1.3; }
  .msg { margin:16px 0; display:flex; animation: rise .4s cubic-bezier(.2,.7,.3,1) both; }
  .msg .bubble { padding:12px 16px; border-radius:16px; font-size:15px; line-height:1.55; }
  .msg.assistant .bubble {
    max-width:min(100%, 680px);
    background:var(--panel); border:1px solid var(--border);
    border-bottom-left-radius:5px;
  }
  /* Rendered markdown inside assistant bubbles */
  .bubble p { margin:0 0 9px; }
  .bubble p:last-child, .bubble ul:last-child, .bubble ol:last-child { margin-bottom:0; }
  .bubble p.h { font-family:var(--serif); font-weight:600; font-size:16px; margin:2px 0 8px; }
  .bubble ul, .bubble ol { margin:6px 0 9px; padding-left:20px; }
  .bubble li { margin:3px 0; }
  .bubble strong { color:#fff; font-weight:600; }
  .bubble em { font-style:italic; color:var(--ink); }
  .bubble code { background:rgba(255,255,255,0.07); border:1px solid var(--border);
                 padding:1px 5px; border-radius:5px; font-size:13px;
                 font-family:'IBM Plex Mono', ui-monospace, monospace; }
  .bubble table { border-collapse:collapse; margin:8px 0; font-size:13.5px;
                  width:100%; }
  .bubble th, .bubble td { border:1px solid var(--border); padding:5px 10px;
                           text-align:left; }
  .bubble th { background:rgba(255,255,255,0.05); font-weight:600; color:#fff; }
  @keyframes rise { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:none;} }

  .chart {
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; margin:14px 0; min-height:300px; overflow:hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    animation: chartIn .5s cubic-bezier(.2,.7,.3,1) both;
    transition: box-shadow .25s, border-color .25s;
  }
  .chart-group.multi {
    display:flex; flex-wrap:wrap; gap:16px; margin:14px 0;
    width:min(1150px, 94vw); position:relative; left:50%; transform:translateX(-50%);
  }
  .chart-group.multi .chart { flex:1 1 460px; min-width:0; margin:0; }
  .chart:hover { box-shadow:0 10px 34px rgba(0,0,0,0.45);
                 border-color:color-mix(in srgb, var(--accent) 30%, transparent); }
  @keyframes chartIn { from{opacity:0;transform:translateY(14px) scale(.99);} to{opacity:1;transform:none;} }

  /* Front-and-center "swish" loader: the ball arcs into the hoop and through
     the net, on a loop. */
  .loader { display:flex; flex-direction:column; align-items:center; gap:18px;
            padding:54px 20px 30px; animation: rise .4s ease both; }
  .court-scene { position:relative; width:260px; height:170px; }
  .court-scene svg { position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
  .court-scene .net { transform-origin:center top; animation: swish 1.8s cubic-bezier(.5,0,.5,1) infinite; }
  .court-scene .ball {
    position:absolute; left:0; top:0; font-size:30px; line-height:1; will-change:transform;
    filter: drop-shadow(0 3px 5px rgba(0,0,0,.4));
    animation: shoot 1.8s cubic-bezier(.33,0,.5,1) infinite;
  }
  .court-scene .ball-shadow {
    position:absolute; bottom:8px; left:24px; width:34px; height:8px; border-radius:50%;
    background:rgba(0,0,0,.45); filter:blur(2px);
    animation: ballshadow 1.8s cubic-bezier(.33,0,.5,1) infinite;
  }
  @keyframes shoot {
    0%   { transform: translate(18px,118px) scale(.7)  rotate(0deg);   opacity:1; }
    8%   { opacity:1; }
    48%  { transform: translate(118px,8px)  scale(1.05) rotate(330deg); }
    66%  { transform: translate(186px,74px) scale(.92) rotate(560deg); opacity:1; }
    78%  { transform: translate(192px,116px) scale(.8) rotate(620deg); opacity:0; }
    100% { transform: translate(192px,116px) scale(.8) rotate(620deg); opacity:0; }
  }
  @keyframes ballshadow {
    0%   { transform: translateX(0)    scaleX(.7); opacity:.45; }
    48%  { transform: translateX(150px) scaleX(.3); opacity:.12; }
    66%  { transform: translateX(178px) scaleX(.5); opacity:.2; }
    100% { transform: translateX(178px) scaleX(.5); opacity:0; }
  }
  @keyframes swish {
    0%,62% { transform: scaleY(1) skewX(0deg); }
    70%    { transform: scaleY(1.28) skewX(6deg); }
    80%    { transform: scaleY(.92) skewX(-4deg); }
    90%,100% { transform: scaleY(1) skewX(0deg); }
  }
  .loader-text { color:var(--muted); font-size:14px; font-style:italic;
                 letter-spacing:.01em; }
  .dots::after { content:''; animation: dots 1.4s steps(1,end) infinite; }
  @keyframes dots { 0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';} }

  form {
    position:fixed; bottom:0; left:0; right:0;
    background:linear-gradient(transparent, var(--bg) 28%);
    padding:24px 14px 30px;
  }
  /* Example chips sit ABOVE the input before the first message, then hide. */
  .hints { max-width:860px; margin:0 auto 11px; display:flex; flex-wrap:wrap; gap:8px;
           transition: opacity .3s, transform .3s; }
  form.started .hints { display:none; }
  .hints .lead { color:var(--muted); font-size:12.5px; align-self:center; margin-right:2px; }
  .hints a {
    color:var(--muted); font-size:12.5px; cursor:pointer; text-decoration:none;
    border:1px solid var(--border); border-radius:999px; padding:6px 13px;
    transition: color .18s, border-color .18s, transform .18s, background .18s;
    background:color-mix(in srgb, var(--panel) 80%, transparent);
  }
  .hints a:hover { color:var(--ink); border-color:var(--accent);
                   transform:translateY(-2px); background:color-mix(in srgb, var(--accent) 9%, transparent); }
  .row { max-width:860px; margin:0 auto; display:flex; gap:10px; }
  input {
    flex:1; padding:13px 16px; border-radius:12px; border:1px solid var(--border);
    background:var(--panel); color:var(--ink); font-size:15px; font-family:var(--sans);
    outline:none; transition: border-color .15s, box-shadow .15s;
  }
  input:focus { border-color:var(--accent);
                box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }
  input::placeholder { color:var(--muted); }
  button {
    padding:13px 26px; border-radius:12px; border:none; background:var(--accent);
    color:var(--on-accent); font-size:15px; font-weight:600; cursor:pointer; font-family:var(--sans);
    transition: filter .15s, transform .12s, box-shadow .15s;
  }
  button:hover { filter:brightness(1.1);
                 box-shadow:0 4px 16px color-mix(in srgb, var(--accent) 30%, transparent); }
  button:active { transform:scale(.96); }
  button:disabled { opacity:.45; cursor:default; transform:none; box-shadow:none; }

  .welcome { text-align:center; color:var(--muted); padding:64px 20px 20px;
             animation: rise .6s ease both; }
  .welcome .big { font-size:46px; margin-bottom:12px; display:inline-block;
                  animation: float 3.6s ease-in-out infinite; }
  .welcome h2 { color:var(--ink); font-family:var(--serif); font-weight:500;
                font-style:italic; font-size:26px; margin:0 0 10px; }
  .welcome p { font-size:14.5px; max-width:470px; margin:0 auto; line-height:1.65; }
  @keyframes float { 0%,100%{transform:translateY(0) rotate(-4deg);} 50%{transform:translateY(-10px) rotate(4deg);} }

  /* Stage = chart flanked by entity side-cards (players left, teams right).
     Breaks out wider than the 860px chat column, same trick as chart-group. */
  .stage { display:flex; gap:16px; align-items:flex-start; justify-content:center;
           width:min(1250px, 96vw); position:relative; left:50%; transform:translateX(-50%);
           margin:16px 0; }
  .stage .chart-area { flex:1 1 auto; min-width:0; }
  .stage .chart-group { display:flex; flex-wrap:wrap; gap:16px; }
  .stage .chart-group .chart { flex:1 1 360px; min-width:0; margin:0; }
  .rail { flex:0 0 198px; width:198px; }
  .rail.flip { cursor:pointer; }

  .ecard { background:var(--panel); border:1px solid var(--border); border-radius:16px;
           padding:15px 15px 13px; box-shadow:0 6px 22px rgba(0,0,0,.26);
           position:sticky; top:84px; animation: chartIn .45s cubic-bezier(.2,.7,.3,1) both; }
  .rail.flip .ecard { transition: border-color .2s, transform .2s, box-shadow .2s; }
  .rail.flip:hover .ecard { border-color:color-mix(in srgb, var(--accent) 35%, transparent);
                            transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,0,0,.34); }
  .ecard .photo { height:104px; border-radius:12px; margin-bottom:11px; overflow:hidden;
                  display:flex; align-items:center; justify-content:center;
                  background:color-mix(in srgb, var(--accent) 8%, transparent); }
  .ecard.player .photo img { width:100%; height:100%; object-fit:cover; object-position:center 16%; }
  .ecard.team .photo img { max-width:72%; max-height:66px; object-fit:contain; }
  .ecard .photo.noimg img { display:none; }
  .ecard .photo.noimg::after { content:'🏀'; font-size:30px; opacity:.35; }
  .ecard .name { font-family:var(--serif); font-weight:600; font-size:16.5px;
                 line-height:1.18; color:var(--ink); }
  .ecard .ebio { color:var(--muted); font-size:11.5px; margin-top:4px; letter-spacing:.01em; }
  .ecard .egrid { display:grid; grid-template-columns:repeat(3,1fr); gap:11px 6px; margin:13px 0 2px; }
  .ecard .stat { display:flex; flex-direction:column; line-height:1.1; }
  .ecard .stat .v { font-size:15px; font-weight:600; color:var(--ink); font-variant-numeric:tabular-nums; }
  .ecard .stat .k { font-size:9.5px; color:var(--muted); text-transform:uppercase;
                    letter-spacing:.05em; margin-top:2px; }
  .ecard .cap { color:var(--muted); font-size:10px; margin-top:8px; opacity:.85; }
  .ecard .nlink { display:inline-block; margin-top:9px; color:var(--accent); font-size:12px;
                  text-decoration:none; font-weight:500; }
  .ecard .nlink:hover { text-decoration:underline; }
  .ecard .pager { display:flex; align-items:center; gap:6px; margin-top:12px;
                  padding-top:11px; border-top:1px solid var(--border); }
  .ecard .pager i { width:6px; height:6px; border-radius:50%; background:var(--border); }
  .ecard .pager i.on { background:var(--accent); }
  .ecard .pager .count { margin-left:auto; color:var(--muted); font-size:10px;
                         letter-spacing:.03em; }
  @media (max-width: 920px) {
    .stage { flex-direction:column; align-items:stretch; left:auto; transform:none; width:auto; }
    .rail { width:auto; flex:none; }
    .ecard { position:static; }
    .rail.team { order:3; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<header>
  <h1><span class="ball">🏀</span>Court&nbsp;<em>Vision</em></h1>
  <span>the NBA, charted on demand</span>
  <div class="themes" id="themes"></div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <div class="big">🏀</div>
    <h2>See the whole floor.</h2>
    <p>Five seasons of NBA data — box scores, 1.2&nbsp;million shots, clutch,
       hustle and tracking defense. Ask a question, get the chart.</p>
  </div>
</div>

<form id="form">
  <div class="hints">
    <span class="lead">Try:</span>
    <!-- chips injected by populateHints() — a random few from a larger bank -->
  </div>
  <div class="row">
    <input id="input" placeholder="e.g. Show me Curry’s shot chart this season" autocomplete="off">
    <button id="send" type="submit">Send</button>
  </div>
</form>

<script>
const chat = document.getElementById('chat');
const form = document.getElementById('form');
const input = document.getElementById('input');
const send = document.getElementById('send');

const PLOTLY_CONFIG = {
  responsive: true,
  displaylogo: false,
  modeBarButtonsToRemove: ['lasso2d', 'select2d', 'autoScale2d', 'zoomIn2d', 'zoomOut2d'],
  toImageButtonOptions: { format: 'png', scale: 2, filename: 'court-vision' }
};

// A bank of questions the app can actually answer; a random few surface each
// load so the landing state feels fresh and hints at the breadth of coverage.
const HINT_BANK = [
  "Jokic vs Embiid scoring by season",
  "Where does Tatum like to shoot from?",
  "Who leads the league in assists?",
  "How does Luka shoot against tight defense?",
  "Curry and Tatum shot charts side by side",
  "Show me SGA's points game by game this season",
  "Top 10 scorers in the league",
  "Warriors three-point shooting trend",
  "Giannis rebounds with a 10-game rolling average",
  "Eastern Conference standings",
  "Steph Curry's hot zones",
  "Wembanyama's shot chart this season",
  "Best clutch scorers in the league",
  "Who gets the most deflections?",
  "Tatum: home vs away scoring",
  "Jokic's points in wins vs losses",
  "Compare LeBron and Durant scoring by season",
  "Shai's shot diet by zone",
  "Who leads the league in blocks?",
  "Lakers scoring margin by opponent",
  "Anthony Edwards points this season",
  "Nikola Jokic's triple-doubles this season",
  "Best three-point shooters by volume",
  "Who defends the rim best?",
];
const HINTS_SHOWN = 6;

function populateHints() {
  const box = document.querySelector('.hints');
  box.querySelectorAll('a').forEach(a => a.remove());   // clear any prior pick
  const pool = HINT_BANK.slice();
  for (let i = pool.length - 1; i > 0; i--) {           // Fisher–Yates shuffle
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  pool.slice(0, HINTS_SHOWN).forEach(q => {
    const a = document.createElement('a');
    a.textContent = q;
    box.appendChild(a);
  });
}
populateHints();

// Delegated so it works for whichever chips were injected this load.
document.querySelector('.hints').addEventListener('click', e => {
  const a = e.target.closest('a');
  if (!a) return;
  input.value = a.textContent;
  form.requestSubmit();
});

// ---- Theme picker -------------------------------------------------------
let activeTheme = localStorage.getItem('nbaviz-theme') || 'broadcast';
const THEMES = {};                 // id -> {palette, series, heat}
let renderedItems = [];            // {div, figure} currently on screen
let renderedTheme = activeTheme;   // the theme those figures are colored in

async function loadThemes() {
  let list;
  try { list = (await (await fetch('/api/themes')).json()).themes; }
  catch (e) { return; }
  const box = document.getElementById('themes');
  box.innerHTML = '<span class="lbl">Theme</span>';
  if (!list.some(t => t.id === activeTheme)) activeTheme = renderedTheme = 'broadcast';
  list.forEach(t => {
    THEMES[t.id] = t;
    const b = document.createElement('button');
    b.className = 'swatch' + (t.id === activeTheme ? ' active' : '');
    b.title = t.label;
    b.style.background = `linear-gradient(135deg, ${t.palette.accent} 0 50%, ${t.palette.accent2} 50% 100%)`;
    b.style.borderColor = t.palette.card;
    b.addEventListener('click', () => {
      activeTheme = t.id;
      localStorage.setItem('nbaviz-theme', t.id);
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      b.classList.add('active');
      applyUITheme(t.id);          // re-skin the whole app
      recolorRendered();           // instantly recolor whatever's on screen
    });
    box.appendChild(b);
  });
  applyUITheme(activeTheme);       // apply the saved theme to the page on load
}

// Re-skin the page shell (header, bubbles, input, accents) to a theme by
// overriding the CSS custom properties — so the whole app themes, not just charts.
function applyUITheme(id) {
  const t = THEMES[id];
  if (!t) return;
  const p = t.palette, r = document.documentElement.style;
  const keys = { '--bg': 'bg', '--card': 'card', '--panel': 'panel',
                 '--border': 'border', '--ink': 'ink', '--muted': 'muted',
                 '--accent': 'accent', '--accent2': 'accent2', '--on-accent': 'on_accent' };
  for (const cssVar in keys) if (p[keys[cssVar]]) r.setProperty(cssVar, p[keys[cssVar]]);
}

// Build a value->value color map from one theme's colors to another's.
function colorMap(from, to) {
  const m = {};
  for (const k in from.palette) if (to.palette[k]) m[from.palette[k].toLowerCase()] = to.palette[k];
  from.series.forEach((c, i) => { if (to.series[i]) m[c.toLowerCase()] = to.series[i]; });
  return m;
}
function recolor(obj, map, heat) {
  if (Array.isArray(obj)) return obj.map(x => recolor(x, map, heat));
  if (obj && typeof obj === 'object') {
    const o = {};
    for (const k in obj) o[k] = (k === 'colorscale') ? heat : recolor(obj[k], map, heat);
    return o;
  }
  if (typeof obj === 'string') return map[obj.toLowerCase()] || obj;
  return obj;
}
function recolorRendered() {
  if (activeTheme === renderedTheme || !renderedItems.length) { renderedTheme = activeTheme; return; }
  const from = THEMES[renderedTheme], to = THEMES[activeTheme];
  if (!from || !to) { renderedTheme = activeTheme; return; }
  const map = colorMap(from, to);
  renderedItems.forEach(it => {
    it.figure = { data: recolor(it.figure.data, map, to.heat),
                  layout: recolor(it.figure.layout, map, to.heat) };
    Plotly.react(it.div, it.figure.data, it.figure.layout, PLOTLY_CONFIG);
  });
  renderedTheme = activeTheme;
}
loadThemes();

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Minimal, safe markdown: escape HTML first, then handle bold/italic/code,
// bullet/numbered lists, headings, tables, and paragraphs.
function renderMarkdown(src) {
  const inline = s => s
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/__([^_]+)__/g, '<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>')
    .replace(/(^|[\s(])_([^_\n]+)_/g, '$1<em>$2</em>');
  const isSep = s => s.includes('-') && /^\s*\|?[\s:|-]*-[\s:|-]*\|?\s*$/.test(s);
  const cells = s => {
    let t = s.trim();
    if (t.startsWith('|')) t = t.slice(1);
    if (t.endsWith('|')) t = t.slice(0, -1);
    return t.split('|').map(c => c.trim());
  };
  const lines = escapeHtml(src).split(/\r?\n/);
  let html = '', list = null, i = 0;
  const closeList = () => { if (list) { html += '</' + list + '>'; list = null; } };
  while (i < lines.length) {
    const line = lines[i].trim();
    if (!line) { closeList(); i++; continue; }
    // Pipe table: a header row followed by a |---|---| separator row.
    if (line.includes('|') && i + 1 < lines.length && isSep(lines[i + 1])) {
      closeList();
      html += '<table><thead><tr>' +
        cells(line).map(c => '<th>' + inline(c) + '</th>').join('') + '</tr></thead><tbody>';
      i += 2;
      while (i < lines.length && lines[i].includes('|') && lines[i].trim()) {
        html += '<tr>' + cells(lines[i]).map(c => '<td>' + inline(c) + '</td>').join('') + '</tr>';
        i++;
      }
      html += '</tbody></table>';
      continue;
    }
    let m;
    if ((m = line.match(/^[-*]\s+(.*)/))) {
      if (list !== 'ul') { closeList(); html += '<ul>'; list = 'ul'; }
      html += '<li>' + inline(m[1]) + '</li>';
    } else if ((m = line.match(/^\d+[.)]\s+(.*)/))) {
      if (list !== 'ol') { closeList(); html += '<ol>'; list = 'ol'; }
      html += '<li>' + inline(m[1]) + '</li>';
    } else if ((m = line.match(/^#{1,6}\s+(.*)/))) {
      closeList(); html += '<p class="h">' + inline(m[1]) + '</p>';
    } else {
      closeList(); html += '<p>' + inline(line) + '</p>';
    }
    i++;
  }
  closeList();
  return html;
}

function addBubble(role, text, { markdown = false } = {}) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const b = document.createElement('div');
  b.className = 'bubble';
  if (markdown) b.innerHTML = renderMarkdown(text);
  else b.textContent = text;
  div.appendChild(b);
  chat.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return b;
}

// Court charts are square; size their card height to the court aspect so they
// fill the width with no letterbox whitespace — identical at any width.
function squareHeight(div, figure) {
  const sq = figure.layout && figure.layout.meta && figure.layout.meta.square;
  const w = div.clientWidth;
  if (!sq || !w) return null;
  const m = figure.layout.margin || {};
  return Math.round((w - (m.l || 0) - (m.r || 0)) * sq + (m.t || 0) + (m.b || 0));
}

// Append every card first so the flex row is fully laid out before any chart
// measures its width — otherwise side-by-side charts resize against a
// mid-layout width and render inconsistently.
function renderFigures(group, figures) {
  const items = figures.map(figure => {
    const div = document.createElement('div');
    div.className = 'chart';
    const h = (figure.layout && figure.layout.height) || 480;
    div.style.height = h + 'px';
    group.appendChild(div);
    return { div, figure };
  });
  renderedItems = items;          // remember for instant theme recolor
  renderedTheme = activeTheme;    // server built these in the active theme

  Promise.all(items.map(({ div, figure }) =>
    Plotly.newPlot(div, figure.data, figure.layout, PLOTLY_CONFIG)
  )).then(() => {
    requestAnimationFrame(() => {
      items.forEach(({ div, figure }) => {
        const sh = squareHeight(div, figure);
        if (sh) div.style.height = sh + 'px';
      });
      requestAnimationFrame(() => items.forEach(({ div }) => Plotly.Plots.resize(div)));
    });
  });
  return items;
}

// Charts alone, in the centered chat column (no entities named).
function addCharts(figures) {
  const group = document.createElement('div');
  group.className = 'chart-group' + (figures.length > 1 ? ' multi' : '');
  chat.appendChild(group);
  renderFigures(group, figures);
  group.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

// One entity box, flippable through `list` if more than one was mentioned.
function entityCardHtml(c, total, idx) {
  const stats = (c.stats || []).map(s =>
    `<div class="stat"><span class="v">${escapeHtml(s.value)}</span>` +
    `<span class="k">${escapeHtml(s.label)}</span></div>`).join('');
  let pager = '';
  if (total > 1) {
    const dots = Array.from({ length: total },
      (_, k) => `<i class="${k === idx ? 'on' : ''}"></i>`).join('');
    pager = `<div class="pager">${dots}<span class="count">${idx + 1} / ${total} · tap to flip</span></div>`;
  }
  return `<div class="ecard ${c.kind}">
    <div class="photo"><img src="${c.image}" alt="" loading="lazy"
         onerror="this.parentElement.classList.add('noimg')"></div>
    <div class="name">${escapeHtml(c.name)}</div>
    ${c.bio ? `<div class="ebio">${escapeHtml(c.bio)}</div>` : ''}
    ${stats ? `<div class="egrid">${stats}</div>` : ''}
    ${c.caption ? `<div class="cap">${escapeHtml(c.caption)}</div>` : ''}
    <a class="nlink" href="${c.href}" target="_blank" rel="noopener">NBA.com ↗</a>
    ${pager}</div>`;
}

function railEl(list, kind) {
  if (!list || !list.length) return null;
  const rail = document.createElement('div');
  rail.className = 'rail ' + kind;
  let idx = 0;
  const draw = () => { rail.innerHTML = entityCardHtml(list[idx], list.length, idx); };
  draw();
  if (list.length > 1) {                 // click anywhere (but the link) to flip
    rail.classList.add('flip');
    rail.addEventListener('click', e => {
      if (e.target.closest('a.nlink')) return;
      idx = (idx + 1) % list.length;
      draw();
    });
  }
  return rail;
}

// Chart(s) with entity side-cards: players on the left, teams on the right.
function addStage(figures, ents) {
  const stage = document.createElement('div');
  stage.className = 'stage';
  const left = railEl(ents.players, 'player');
  const right = railEl(ents.teams, 'team');
  let group = null;
  if (left) stage.appendChild(left);
  if (figures.length) {
    const area = document.createElement('div');
    area.className = 'chart-area';
    group = document.createElement('div');
    group.className = 'chart-group';
    area.appendChild(group);
    stage.appendChild(area);
  }
  if (right) stage.appendChild(right);
  chat.appendChild(stage);               // whole flex row in the DOM first...
  if (group) renderFigures(group, figures);   // ...then charts measure correctly
  stage.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function showQuery(message) {
  const q = document.createElement('div');
  q.className = 'query';
  q.innerHTML = '<div class="label">Question</div>';
  const t = document.createElement('div');
  t.className = 'text';
  t.textContent = message;
  q.appendChild(t);
  chat.appendChild(q);
}

function showLoader() {
  const el = document.createElement('div');
  el.className = 'loader';
  el.innerHTML = `
    <div class="court-scene">
      <svg viewBox="0 0 260 170" aria-hidden="true">
        <rect x="231" y="44" width="5" height="58" rx="1.5"
              fill="var(--muted)" fill-opacity="0.45"/>
        <rect x="210" y="64" width="22" height="20" rx="2" fill="none"
              stroke="var(--muted)" stroke-opacity="0.4" stroke-width="2"/>
        <g class="net" stroke="var(--muted)" stroke-width="1.5"
           fill="none" stroke-linecap="round" stroke-opacity="0.7">
          <path d="M187 88 L197 118 M196 88 L202 118 M205 88 L205 118
                   M214 88 L208 118 M223 88 L213 118"/>
          <path d="M192 100 H218 M197 110 H213" stroke-width="1.2"/>
        </g>
        <ellipse cx="205" cy="88" rx="19" ry="5" fill="none"
                 stroke="var(--accent)" stroke-width="3.5"/>
      </svg>
      <div class="ball-shadow"></div>
      <span class="ball">🏀</span>
    </div>
    <div class="loader-text">Drawing it up<span class="dots"></span></div>`;
  chat.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  return el;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const message = input.value.trim();
  if (!message) return;
  form.classList.add('started');           // hide the example chips
  // Single-turn: every question starts fresh — clear the previous answer.
  chat.innerHTML = '';
  input.value = '';
  send.disabled = true;
  showQuery(message);
  const loader = showLoader();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, theme: activeTheme })
    });
    if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
    const data = await res.json();
    loader.remove();
    const ents = data.entities || { players: [], teams: [] };
    const figs = data.figures || [];
    if (ents.players.length || ents.teams.length) addStage(figs, ents);
    else if (figs.length) addCharts(figs);
    if (data.reply) addBubble('assistant', data.reply, { markdown: true });
  } catch (err) {
    loader.remove();
    addBubble('assistant', 'Something went wrong — ' + err.message + '. Try again?');
  } finally {
    send.disabled = false;
    input.focus();
  }
});
input.focus();
</script>
</body>
</html>
